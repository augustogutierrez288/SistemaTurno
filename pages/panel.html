<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Gestión - HCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #212529; }
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .navbar-doctor { background-color: var(--sidebar-bg); }
        .card-custom { border-radius: 12px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.04); background: white; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark navbar-doctor sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" id="panelTitle" href="#">👨‍⚕️ Panel de Control</a>
            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-3" id="userNameDisplay"></span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div id="vistaAdmin" class="d-none">
            <h2 class="fw-bold mb-4">Administración: Gestión de Doctores</h2>
            <div class="row">
                <div class="col-md-5">
                    <div class="card-custom p-4">
                        <h5>Crear Nuevo Doctor</h5>
                        <form id="formCrearDoctor">
                            <div class="mb-2"><input type="text" id="docNombre" class="form-control" placeholder="Nombre completo" required></div>
                            <div class="mb-2"><input type="email" id="docEmail" class="form-control" placeholder="Correo electrónico" required></div>
                            <div class="mb-2"><input type="number" id="docDni" class="form-control" placeholder="DNI" required></div>
                            <div class="mb-2"><input type="text" id="docEspecialidad" class="form-control" placeholder="Especialidad (Ej: Oncología)" required></div>
                            <div class="mb-3"><input type="password" id="docPassword" class="form-control" placeholder="Contraseña" required></div>
                            <button type="submit" class="btn btn-primary w-100">Registrar Doctor</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card-custom p-4">
                        <h5>Doctores Activos</h5>
                        <ul class="list-group mt-3" id="listaDoctores"></ul>
                    </div>
                </div>
            </div>
        </div>

        <div id="vistaDoctor" class="d-none">
            <h2 class="fw-bold mb-4">Mi Consultorio</h2>
            <div class="row">
                <div class="col-md-4">
                    <div class="card-custom p-4 mb-4">
                        <h5 class="border-bottom pb-2">Crear Turno Disponible</h5>
                        <form id="formCrearTurno">
                            <div class="mb-2"><label>Fecha</label><input type="date" id="turnoFecha" class="form-control" required></div>
                            <div class="mb-3"><label>Hora</label><input type="time" id="turnoHora" class="form-control" required></div>
                            <button type="submit" class="btn btn-success w-100">Agregar a mi Agenda</button>
                        </form>
                    </div>
                    
                    <div class="card-custom p-4">
                        <h5 class="border-bottom pb-2">Mi Agenda Libre</h5>
                        <ul class="list-group list-group-flush small" id="listaMisTurnos"></ul>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card-custom p-4">
                        <h5 class="border-bottom pb-2">Gestión de Citas y Pacientes</h5>
                        <div id="contenedorPacientes" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const sesion = JSON.parse(localStorage.getItem('sesion_actual'));
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!sesion || sesion.rol === 'paciente') { window.location.href = 'index.html'; return; }
            document.getElementById('userNameDisplay').textContent = `Hola, ${sesion.nombre}`;

            if (sesion.rol === 'admin') {
                document.getElementById('vistaAdmin').classList.remove('d-none');
                renderizarDoctores();
                
                document.getElementById('formCrearDoctor').addEventListener('submit', (e) => {
                    e.preventDefault();
                    let doctores = JSON.parse(localStorage.getItem('doctores_hcs')) || [];
                    const dni = document.getElementById('docDni').value;
                    if(doctores.find(d => d.dni === dni)) return alert('Doctor ya existe');

                    doctores.push({
                        nombre: document.getElementById('docNombre').value,
                        email: document.getElementById('docEmail').value,
                        dni: dni,
                        especialidad: document.getElementById('docEspecialidad').value,
                        password: document.getElementById('docPassword').value,
                        rol: 'doctor'
                    });
                    localStorage.setItem('doctores_hcs', JSON.stringify(doctores));
                    document.getElementById('formCrearDoctor').reset();
                    renderizarDoctores();
                });

            } else if (sesion.rol === 'doctor') {
                document.getElementById('vistaDoctor').classList.remove('d-none');
                renderizarMiAgenda();
                renderizarMisPacientes();

                document.getElementById('formCrearTurno').addEventListener('submit', (e) => {
                    e.preventDefault();
                    let turnos = JSON.parse(localStorage.getItem('turnos_disponibles_hcs')) || [];
                    turnos.push({
                        id: 'T' + Date.now(),
                        doctorDni: sesion.dni, doctorNombre: sesion.nombre, especialidad: sesion.especialidad,
                        fecha: document.getElementById('turnoFecha').value, hora: document.getElementById('turnoHora').value
                    });
                    localStorage.setItem('turnos_disponibles_hcs', JSON.stringify(turnos));
                    document.getElementById('formCrearTurno').reset();
                    renderizarMiAgenda();
                });
            }
        });

        function cerrarSesion() { localStorage.removeItem('sesion_actual'); window.location.href = 'auth.html'; }

        function renderizarDoctores() {
            const doctores = JSON.parse(localStorage.getItem('doctores_hcs')) || [];
            const lista = document.getElementById('listaDoctores');
            lista.innerHTML = '';
            doctores.forEach(doc => {
                if(doc.rol !== 'admin') lista.innerHTML += `<li class="list-group-item"><strong>Dr/a. ${doc.nombre}</strong> - ${doc.especialidad}</li>`;
            });
        }

        function renderizarMiAgenda() {
            const turnos = JSON.parse(localStorage.getItem('turnos_disponibles_hcs')) || [];
            const misTurnos = turnos.filter(t => t.doctorDni === sesion.dni);
            const lista = document.getElementById('listaMisTurnos');
            lista.innerHTML = misTurnos.length === 0 ? '<li class="list-group-item text-muted">Agenda vacía</li>' : '';
            misTurnos.forEach(t => lista.innerHTML += `<li class="list-group-item border-start border-4 border-success">🗓️ ${t.fecha} a las ⏰ ${t.hora}</li>`);
        }

        function renderizarMisPacientes() {
            const usuarios = JSON.parse(localStorage.getItem('usuarios_hcs')) || [];
            const contenedor = document.getElementById('contenedorPacientes');
            contenedor.innerHTML = '';

            const misPacientes = usuarios.filter(u => u.turnos && u.turnos.some(t => t.doctorDni === sesion.dni));
            if (misPacientes.length === 0) { contenedor.innerHTML = '<p class="text-muted">Aún no tienes turnos reservados.</p>'; return; }

            misPacientes.forEach((paciente) => {
                const turnosConmigo = paciente.turnos.filter(t => t.doctorDni === sesion.dni);
                
                let turnosList = turnosConmigo.map(t => {
                    if (t.estado === 'Cancelado') return `<li class="list-group-item text-danger text-decoration-line-through">Cancelado: ${t.fecha} - ${t.hora}</li>`;

                    let controlesAdicionales = '';
                    if (t.modalidad === 'Telemedicina') {
                        controlesAdicionales = t.meetLink 
                            ? `<p class="text-success small mb-1">Enlace Meet Enviado: <a href="${t.meetLink}" target="_blank">Ver</a></p>` 
                            : `<div class="input-group input-group-sm mt-2 mb-2"><input type="url" id="meet-${paciente.dni}-${t.id}" class="form-control" placeholder="Pegar URL de Google Meet"><button class="btn btn-outline-primary" onclick="guardarMeet('${paciente.dni}', '${t.id}')">Adjuntar Meet</button></div>`;
                    }

                    return `<li class="list-group-item bg-light border mb-2">
                        <div class="d-flex justify-content-between">
                            <strong>🗓️ ${t.fecha} a las ${t.hora} (${t.modalidad})</strong>
                            <button class="btn btn-sm btn-danger" onclick="cancelarTurno('${paciente.dni}', '${t.id}')">Cancelar Turno</button>
                        </div>
                        ${controlesAdicionales}
                    </li>`;
                }).join('');

                contenedor.innerHTML += `
                    <div class="card mb-4 shadow-sm border-0">
                        <div class="card-body">
                            <h5 class="text-primary">${paciente.apellido}, ${paciente.nombre} <small class="text-muted">(DNI: ${paciente.dni})</small></h5>
                            <p class="small text-muted mb-3">Email Contacto: ${paciente.email || 'No registrado'}</p>
                            
                            <h6 class="fw-bold text-secondary">Turnos del Paciente:</h6>
                            <ul class="list-group list-group-flush mb-3">${turnosList}</ul>
                        </div>
                    </div>`;
            });
        }

        window.guardarMeet = function(dniPaciente, idTurno) {
            const input = document.getElementById(`meet-${dniPaciente}-${idTurno}`);
            if (!input.value.trim() || !input.value.startsWith('http')) return alert("Por favor, ingrese un enlace válido (http/https).");

            let usuarios = JSON.parse(localStorage.getItem('usuarios_hcs'));
            let paciente = usuarios.find(u => u.dni === dniPaciente);
            let turno = paciente.turnos.find(t => t.id === idTurno);
            
            turno.meetLink = input.value.trim();
            localStorage.setItem('usuarios_hcs', JSON.stringify(usuarios));
            renderizarMisPacientes();
        };

        window.cancelarTurno = function(dniPaciente, idTurno) {
            if(!confirm("¿Está seguro de que desea cancelar este turno? El paciente será notificado en su panel.")) return;
            
            let usuarios = JSON.parse(localStorage.getItem('usuarios_hcs'));
            let paciente = usuarios.find(u => u.dni === dniPaciente);
            let turno = paciente.turnos.find(t => t.id === idTurno);
            
            turno.estado = 'Cancelado';
            localStorage.setItem('usuarios_hcs', JSON.stringify(usuarios));
            renderizarMisPacientes();
        };
    </script>
</body>
</html>
