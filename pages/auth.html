<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Hospital Centro de Salud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #0056b3; }
        body { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .auth-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; overflow: hidden; }
        .nav-tabs .nav-link { color: #6c757d; font-weight: 500; border: none; }
        .nav-tabs .nav-link.active { color: var(--primary-color) !important; border-bottom: 3px solid var(--primary-color); font-weight: bold; }
        .btn-custom { background-color: var(--primary-color); color: white; }
        .brand-header { background-color: var(--primary-color); color: white; padding: 1.5rem; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div id="alertContenedor" class="alert d-none alert-dismissible fade show" role="alert">
                    <span id="alertMensaje"></span>
                </div>

                <div class="card auth-card">
                    <div class="brand-header">
                        <h4 class="margin-0 fw-bold">🏥 HCS Tucumán</h4>
                        <small>Portal Integral de Salud</small>
                    </div>
                    
                    <div class="card-body p-4">
                        <ul class="nav nav-tabs nav-fill mb-4" role="tablist">
                            <li class="nav-item"><button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginContainer" type="button">Ingresar</button></li>
                            <li class="nav-item"><button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerContainer" type="button">Registro Pacientes</button></li>
                        </ul>

                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="loginContainer">
                                <form id="formLogin">
                                    <div class="mb-3"><label class="form-label">Número de DNI</label><input type="text" class="form-control" id="loginDni" required></div>
                                    <div class="mb-3"><label class="form-label">Contraseña</label><input type="password" class="form-control" id="loginPassword" required></div>
                                    <button type="submit" class="btn btn-custom w-100 btn-lg mt-3">Iniciar Sesión</button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="registerContainer">
                                <form id="formRegistro">
                                    <div class="row">
                                        <div class="col-6 mb-3"><label class="form-label">Nombre</label><input type="text" class="form-control" id="regNombre" required></div>
                                        <div class="col-6 mb-3"><label class="form-label">Apellido</label><input type="text" class="form-control" id="regApellido" required></div>
                                    </div>
                                    <div class="mb-3"><label class="form-label">DNI</label><input type="number" class="form-control" id="regDni" required></div>
                                    <div class="mb-3"><label class="form-label">Correo Electrónico</label><input type="email" class="form-control" id="regEmail" placeholder="Ej: paciente@mail.com" required></div>
                                    <div class="mb-3"><label class="form-label">Contraseña</label><input type="password" class="form-control" id="regPassword" required></div>
                                    <button type="submit" class="btn btn-custom w-100 btn-lg mt-3">Crear Cuenta</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let doctores = JSON.parse(localStorage.getItem('doctores_hcs'));
            if (!doctores) {
                doctores = [{ dni: 'admin', nombre: 'Súper', apellido: 'Admin', email: 'admin@hcs.com', password: 'admin', rol: 'admin', especialidad: 'Sistemas' }];
                localStorage.setItem('doctores_hcs', JSON.stringify(doctores));
            }

            const alertCont = document.getElementById('alertContenedor');
            const alertMsj = document.getElementById('alertMensaje');

            const mostrarAlerta = (msj, tipo = 'danger') => {
                alertCont.className = `alert alert-${tipo} mb-3`;
                alertMsj.textContent = msj;
                alertCont.classList.remove('d-none');
            };

            document.getElementById('formLogin').addEventListener('submit', (e) => {
                e.preventDefault();
                const dni = document.getElementById('loginDni').value.trim();
                const pass = document.getElementById('loginPassword').value;

                const pacientes = JSON.parse(localStorage.getItem('usuarios_hcs')) || [];
                const medicosAdmin = JSON.parse(localStorage.getItem('doctores_hcs')) || [];

                const usuarioStaff = medicosAdmin.find(u => u.dni === dni && u.password === pass);
                if (usuarioStaff) {
                    localStorage.setItem('sesion_actual', JSON.stringify(usuarioStaff));
                    window.location.href = '/pages/panel.html';
                    return;
                }

                const usuarioPaciente = pacientes.find(u => u.dni === dni && u.password === pass);
                if (usuarioPaciente) {
                    usuarioPaciente.rol = 'paciente';
                    localStorage.setItem('sesion_actual', JSON.stringify(usuarioPaciente));
                    window.location.href = '../index.html';
                    return;
                }
                mostrarAlerta('DNI o contraseña incorrectos.');
            });

            document.getElementById('formRegistro').addEventListener('submit', (e) => {
                e.preventDefault();
                const dni = document.getElementById('regDni').value.trim();
                let usuarios = JSON.parse(localStorage.getItem('usuarios_hcs')) || [];

                if (usuarios.find(u => u.dni === dni) || doctores.find(u => u.dni === dni)) {
                    return mostrarAlerta('El DNI ya está registrado.');
                }

                usuarios.push({
                    nombre: document.getElementById('regNombre').value.trim(),
                    apellido: document.getElementById('regApellido').value.trim(),
                    dni: dni,
                    email: document.getElementById('regEmail').value.trim(),
                    password: document.getElementById('regPassword').value,
                    diagnosticos: [], turnos: [], rol: 'paciente'
                });

                localStorage.setItem('usuarios_hcs', JSON.stringify(usuarios));
                mostrarAlerta('¡Cuenta creada! Ya puede iniciar sesión.', 'success');
                document.getElementById('formRegistro').reset();
            });
        });
    </script>
</body>
</html>
