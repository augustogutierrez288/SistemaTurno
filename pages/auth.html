<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Hospital Centro de Salud</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0056b3;
            --background-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        
        body {
            background: var(--background-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .auth-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: none;
            overflow: hidden;
        }

        .nav-tabs .nav-link {
            color: #6c757d;
            font-weight: 500;
            border: none;
            border-bottom: 3px solid transparent;
        }

        .nav-tabs .nav-link.active {
            color: var(--primary-color) !important;
            border: none;
            border-bottom: 3px solid var(--primary-color);
            font-weight: bold;
        }

        .btn-custom {
            background-color: var(--primary-color);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background-color: #004494;
            color: white;
        }
        
        .brand-header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div id="alertContenedor" class="alert d-none alert-dismissible fade show" role="alert">
                    <span id="alertMensaje"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card auth-card">
                    <div class="brand-header">
                        <h4 class="margin-0 fw-bold">🏥 Hospital Centro de Salud</h4>
                        <small>Portal de Oncología - San Miguel de Tucumán</small>
                    </div>
                    
                    <div class="card-body p-4">
                        <ul class="nav nav-tabs nav-fill mb-4" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginContainer" type="button" role="tab">Ingresar</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerContainer" type="button" role="tab">Registrarse</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="authTabsContent">
                            
                            <div class="tab-pane fade show active" id="loginContainer" role="tabpanel">
                                <form id="formLogin">
                                    <div class="mb-3">
                                        <label for="loginDni" class="form-label">Número de DNI</label>
                                        <input type="number" class="form-control" id="loginDni" placeholder="Sin puntos ni espacios" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="loginPassword" class="form-label">Contraseña</label>
                                        <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                                    </div>
                                    <div class="form-text mb-3 text-muted text-center">
                                        💡 Probar médico -> DNI: <b>0000</b> | Clave: <b>doctor</b>
                                    </div>
                                    <div class="d-grid mt-4">
                                        <button type="submit" class="btn btn-custom btn-lg">Iniciar Sesión</button>
                                    </div>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="registerContainer" role="tabpanel">
                                <form id="formRegistro">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="regNombre" class="form-label">Nombre</label>
                                            <input type="text" class="form-control" id="regNombre" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="regApellido" class="form-label">Apellido</label>
                                            <input type="text" class="form-control" id="regApellido" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="regDni" class="form-label">DNI</label>
                                        <input type="number" class="form-control" id="regDni" placeholder="Número de documento único" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="regPassword" class="form-label">Crea una Contraseña</label>
                                        <input type="password" class="form-control" id="regPassword" placeholder="Mínimo 4 caracteres" minlength="4" required>
                                    </div>
                                    <div class="d-grid mt-4">
                                        <button type="submit" class="btn btn-custom btn-lg">Crear Cuenta</button>
                                    </div>
                                </form>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const formLogin = document.getElementById('formLogin');
            const formRegistro = document.getElementById('formRegistro');
            const alertContenedor = document.getElementById('alertContenedor');
            const alertMensaje = document.getElementById('alertMensaje');

            // Función para mostrar alertas integradas
            const mostrarAlerta = (mensaje, tipo = 'danger') => {
                alertContenedor.className = `alert alert-${tipo} alert-dismissible fade show`;
                alertMensaje.textContent = mensaje;
                alertContenedor.classList.remove('d-none');
            };

            // LÓGICA DE REGISTRO
            formRegistro.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const dni = document.getElementById('regDni').value.trim();
                const nombre = document.getElementById('regNombre').value.trim();
                const apellido = document.getElementById('regApellido').value.trim();
                const password = document.getElementById('regPassword').value;

                // Traer usuarios existentes de LocalStorage
                let usuarios = JSON.parse(localStorage.getItem('usuarios_hcs')) || [];

                // Validar si el DNI ya existe
                const existeUsuario = usuarios.find(u => u.dni === dni);
                if (existeUsuario || dni === "0000") {
                    mostrarAlerta('El DNI ingresado ya se encuentra registrado.');
                    return;
                }

                // Crear estructura solicitada con arrays vacíos
                const nuevoUsuario = {
                    nombre,
                    apellido,
                    dni,
                    password,
                    diagnosticos: [], // Reservado para el Médico
                    turnos: []       // Almacenará el historial de turnos solicitados
                };

                usuarios.push(nuevoUsuario);
                localStorage.setItem('usuarios_hcs', JSON.stringify(usuarios));

                mostrarAlerta('¡Usuario registrado con éxito! Ya puedes iniciar sesión.', 'success');
                formRegistro.reset();
                
                // Forzar cambio visual a la pestaña de login
                const loginTabTrigger = new bootstrap.Tab(document.getElementById('login-tab'));
                loginTabTrigger.show();
            });

            // LÓGICA DE LOGIN
            formLogin.addEventListener('submit', (e) => {
                e.preventDefault();

                const dni = document.getElementById('loginDni').value.trim();
                const password = document.getElementById('loginPassword').value;

                // ACCESO ESPECIAL: Médico / Doctor
                if (dni === "0000" && password === "doctor") {
                    mostrarAlerta('Accediendo al Panel Médico...', 'info');
                    setTimeout(() => {
                        window.location.href = 'panel.html';
                    }, 1000);
                    return;
                }

                // ACCESO PACIENTES: Buscar en LocalStorage
                const usuarios = JSON.parse(localStorage.getItem('usuarios_hcs')) || [];
                const usuarioValido = usuarios.find(u => u.dni === dni && u.password === password);

                if (usuarioValido) {
                    // Guardamos la sesión activa del paciente actual
                    localStorage.setItem('sesion_paciente', JSON.stringify(usuarioValido));
                    mostrarAlerta(`Bienvenido/a ${usuarioValido.nombre}`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html'; // Redirige a la pantalla de turnos principal
                    }, 1000);
                } else {
                    mostrarAlerta('DNI o contraseña incorrectos. Por favor revise sus datos.');
                }
            });
        });
    </script>
</body>
</html>
