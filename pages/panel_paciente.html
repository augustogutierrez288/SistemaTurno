<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Turnos - HCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #0056b3; }
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background-color: var(--primary-color); }
        .navbar-custom .navbar-brand, .navbar-custom .nav-link { color: #ffffff !important; }
        .card-turno { border-left: 5px solid var(--primary-color); border-radius: 10px; margin-bottom: 1rem; }
        .card-cancelado { border-left: 5px solid #dc3545; opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏥 HCS Tucumán</a>
            <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon" style="filter: invert(1);"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="panel_paciente.html">🩺 Mis Turnos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="cerrarSesion()">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <div class="col-12">
                <h2 class="fw-bold mb-4">Mi Historial de Turnos</h2>
                <div id="listaMisTurnos"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const sesion = JSON.parse(localStorage.getItem('sesion_actual'));

        document.addEventListener('DOMContentLoaded', () => {
            if (!sesion || sesion.rol !== 'paciente') {
                window.location.href = 'index.html';
                return;
            }
            renderizarTurnos();
        });

        function renderizarTurnos() {
            const usuarios = JSON.parse(localStorage.getItem('usuarios_hcs')) || [];
            const pacienteActual = usuarios.find(u => u.dni === sesion.dni);
            const contenedor = document.getElementById('listaMisTurnos');

            if (!pacienteActual.turnos || pacienteActual.turnos.length === 0) {
                contenedor.innerHTML = '<div class="alert alert-info">Aún no has solicitado ningún turno.</div>';
                return;
            }

            contenedor.innerHTML = '';
            // Invertir para mostrar los más recientes arriba
            const turnosInvertidos = [...pacienteActual.turnos].reverse();

            turnosInvertidos.forEach(t => {
                const esCancelado = t.estado === 'Cancelado';
                const claseCard = esCancelado ? 'card-cancelado' : 'card-turno';
                const badgeEstado = esCancelado 
                    ? `<span class="badge bg-danger">Cancelado por el Doctor</span>`
                    : `<span class="badge bg-success">Confirmado</span>`;

                let accionHtml = '';
                if (!esCancelado && t.modalidad === 'Telemedicina') {
                    if (t.meetLink) {
                        accionHtml = `<a href="${t.meetLink}" target="_blank" class="btn btn-primary btn-sm mt-2">💻 Unirse a Google Meet</a>`;
                    } else {
                        accionHtml = `<p class="text-muted small mt-2 mb-0">El doctor adjuntará el enlace de Meet pronto.</p>`;
                    }
                }

                contenedor.innerHTML += `
                    <div class="card shadow-sm border-0 bg-white ${claseCard}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h5 class="text-dark mb-1">Dr/a. ${t.doctorNombre} <small class="text-muted">(${t.especialidad})</small></h5>
                                    <p class="mb-1"><strong>Fecha:</strong> ${t.fecha} a las ${t.hora}</p>
                                    <p class="mb-0"><strong>Modalidad:</strong> ${t.modalidad}</p>
                                    ${accionHtml}
                                </div>
                                <div>${badgeEstado}</div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function cerrarSesion() { localStorage.removeItem('sesion_actual'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
