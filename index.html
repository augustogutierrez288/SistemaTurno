<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Turnos - HCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #0056b3; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background-color: var(--primary-color); }
        .navbar-custom .navbar-brand, .navbar-custom .nav-link { color: #ffffff !important; }
        header.hero-section { background: linear-gradient(135deg, var(--primary-color), #00a8ff); color: white; padding: 3rem 0; margin-bottom: 2rem; }
        .form-container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./index.html">🏥 HCS Tucumán</a>
            <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon" style="filter: invert(1);"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="./index.html">Inicio</a></li>
                    <li class="nav-item d-none" id="navMisTurnos"><a class="nav-link" href="./pages/panel_paciente.html">🩺 Mis Turnos</a></li>
                    <li class="nav-item" id="navLogin"><a class="nav-link" href="./pages/auth.html">Iniciar Sesión</a></li>
                    <li class="nav-item d-none" id="navLogout"><a class="nav-link" href="#" onclick="cerrarSesion()">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">Solicitud de Turnos</h1>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div id="mensajeLogin" class="alert alert-warning text-center d-none">
                    <h4>Debe iniciar sesión</h4>
                    <p>Para solicitar un turno, por favor inicie sesión o regístrese.</p>
                    <a href="./pages/auth.html" class="btn btn-primary">Ir a Iniciar Sesión</a>
                </div>

                <div class="form-container" id="contenedorFormulario" style="display: none;">
                    <form id="formularioTurno">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Modalidad de Atención</label>
                            <div class="d-flex gap-3">
                                <div class="form-check"><input class="form-check-input" type="radio" name="modalidad" id="modPresencial" value="Presencial" checked><label class="form-check-label" for="modPresencial">🏢 Presencial</label></div>
                                <div class="form-check"><input class="form-check-input" type="radio" name="modalidad" id="modTelemedicina" value="Telemedicina"><label class="form-check-label" for="modTelemedicina">💻 Telemedicina</label></div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Turnos Disponibles</label>
                            <select class="form-select" id="turnoSeleccionado" required></select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3"><label class="form-label">Nombre y Apellido</label><input type="text" class="form-control" id="nombreCompleto" readonly></div>
                            <div class="col-md-6 mb-3"><label class="form-label">DNI</label><input type="text" class="form-control" id="dni" readonly></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">Confirmar Turno</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="emailToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="emailToastBody">
                    </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const sesion = JSON.parse(localStorage.getItem('sesion_actual'));
        
        document.addEventListener('DOMContentLoaded', () => {
            if (sesion) {
                document.getElementById('navLogin').classList.add('d-none');
                document.getElementById('navLogout').classList.remove('d-none');
                
                if (sesion.rol === 'paciente') {
                    document.getElementById('navMisTurnos').classList.remove('d-none');
                    document.getElementById('contenedorFormulario').style.display = 'block';
                    document.getElementById('nombreCompleto').value = `${sesion.nombre} ${sesion.apellido}`;
                    document.getElementById('dni').value = sesion.dni;
                    cargarTurnosDisponibles();
                } else {
                    window.location.href = './pages/panel.html';
                }
            } else {
                document.getElementById('mensajeLogin').classList.remove('d-none');
            }
        });

        function cargarTurnosDisponibles() {
            const turnosDisponibles = JSON.parse(localStorage.getItem('turnos_disponibles_hcs')) || [];
            const select = document.getElementById('turnoSeleccionado');
            select.innerHTML = '<option value="" selected disabled>Seleccione un turno...</option>';
            
            if (turnosDisponibles.length === 0) {
                select.innerHTML = '<option value="" disabled>No hay turnos disponibles.</option>';
                return;
            }

            turnosDisponibles.forEach(turno => {
                select.innerHTML += `<option value="${turno.id}">${turno.fecha} | ${turno.hora} - Dr/a. ${turno.doctorNombre} (${turno.especialidad})</option>`;
            });
        }

        document.getElementById('formularioTurno').addEventListener('submit', (e) => {
            e.preventDefault();
            const idTurno = document.getElementById('turnoSeleccionado').value;
            const modalidad = document.querySelector('input[name="modalidad"]:checked').value;
            let turnos = JSON.parse(localStorage.getItem('turnos_disponibles_hcs')) || [];
            
            const indice = turnos.findIndex(t => t.id === idTurno);
            const turnoReservado = turnos.splice(indice, 1)[0];
            turnoReservado.modalidad = modalidad;
            turnoReservado.estado = 'Activo'; // Estado para seguimiento

            // Guardar en paciente
            let usuarios = JSON.parse(localStorage.getItem('usuarios_hcs'));
            let pIndex = usuarios.findIndex(u => u.dni === sesion.dni);
            usuarios[pIndex].turnos.push(turnoReservado);
            localStorage.setItem('usuarios_hcs', JSON.stringify(usuarios));
            localStorage.setItem('turnos_disponibles_hcs', JSON.stringify(turnos));

            // Simulación de envío de correo mediante Toast
            const emailHtml = `📧 <strong>Enviando confirmación...</strong><br>Se notificó a <u>${sesion.email || 'tu correo'}</u>. Tienes un turno ${modalidad} el ${turnoReservado.fecha} a las ${turnoReservado.hora}.`;
            document.getElementById('emailToastBody').innerHTML = emailHtml;
            new bootstrap.Toast(document.getElementById('emailToast')).show();

            cargarTurnosDisponibles();
            document.getElementById('formularioTurno').reset();
        });

        function cerrarSesion() { localStorage.removeItem('sesion_actual'); window.location.reload(); }
    </script>
</body>
</html>
